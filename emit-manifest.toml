# Emit manifest — the single source of truth for what a generated brain contains.
#
# SPEC.md §5.2. Every file the golden (../second-brain-test) tracks is classified
# below into exactly one bucket. Consumed by:
#   • the generator — which files to emit, and how (copy / clean / post-step);
#   • the G2 structural diff — the include-list (dev-process files are excluded,
#     so they never count as differences vs the golden);
#   • the forbidden-reference guard (tools/check_no_forbidden_refs.py) — its scope
#     is the emitted tree, which by construction excludes every non-emitted entry.
#
# Invariant: the FIVE path sets below must PARTITION the golden's tracked files —
# every tracked file appears in exactly one, none appears twice.
# tools/check_manifest_partition.py enforces this against `git ls-files`.
#
# This manifest describes the TARGET state (post golden-rework, prototype-first).
# The `cleaned` variants and the expanded README are produced when the golden is
# reworked and templatized (G1); the classification here is the spec for that.
#
# Data only; declarative. Paths are golden-relative. Stdlib-loadable via tomllib.

# Tokens that must never appear in an emitted brain (SPEC §5.2/§5.3). The guard
# fails on any hit in the generated tree.
forbidden_tokens = ["ai-project-status"]


# --- verbatim -----------------------------------------------------------------
# Copied byte-for-byte from the template into the generated brain. Confirmed free
# of forbidden tokens AND of any `SPEC.md §X` / cross-repo pointer.
[verbatim]
paths = [
  ".gitattributes",
  ".gitignore",
  "config/.gitkeep",
  "data/.gitkeep",
  "requirements.txt",
  "scripts/check_line_count.py",
  "scripts/seed_vault.py",
  "scripts/self_test.py",
  "seeds/archive/.gitkeep",
  "seeds/areas/knowledge-management.md",
  "seeds/projects/second-brain.md",
  "seeds/resources/embeddings.md",
  "seeds/resources/sqlite-vec.md",
  "tests/fixtures/vault/areas/habits.md",
  "tests/fixtures/vault/areas/.habits.embed.json",
  "tests/fixtures/vault/resources/vectors.md",
  "tests/fixtures/vault/resources/.vectors.embed.json",
]

# --- cleaned ------------------------------------------------------------------
# Emitted, but the template stores an ALREADY-cleaned variant. Two kinds of
# cleaning (a file may need both), all done ONCE when the golden is productized
# into the template — not per-generation:
#   • forbidden-token scrub — remove every `ai-project-status` reference (OQ-4/§5.2)
#   • spec-ref scrub — remove `SPEC.md §X` pointers (SPEC.md is not emitted, OQ-4);
#     `tests/README.md` also loses its cross-repo "devkit OQ-2" pointer
#   • README expansion — README.md grows into the brain's operational doc (OQ-4)
[cleaned]
paths = [
  "CLAUDE.md",
  "GEMINI.md",
  "README.md",
  "tests/README.md",
  ".githooks/pre-commit",
  "scripts/db.py",
  "scripts/embed_staged.py",
  "scripts/embedder.py",
  "scripts/hydrate_cache.py",
  "scripts/register.py",
  "scripts/search_vault.py",
]

[cleaned.reasons]
"CLAUDE.md" = "forbidden-token scrub (drop the ai-project-status block + Commit-schema + Daily-plan sections) + spec-ref scrub"
"GEMINI.md" = "symlink -> CLAUDE.md; inherits both scrubs, emitted as a symlink"
"README.md" = "spec-ref scrub + EXPAND into the operational doc (record/query/setup); add a provenance back-reference to the devkit (origin + canonical spec home) — a path to the internals, not a runtime dependency (OQ-4)"
"tests/README.md" = "spec-ref scrub + drop the cross-repo 'devkit OQ-2' pointer"
".githooks/pre-commit" = "spec-ref scrub (drops 'SPEC.md §5.1')"
"scripts/db.py" = "spec-ref scrub (drops 'SPEC.md §7')"
"scripts/embed_staged.py" = "spec-ref scrub (drops 'SPEC.md §3.1 / §5.1')"
"scripts/embedder.py" = "spec-ref scrub (drops 'SPEC.md §4' pointers; keep the inline same-model note)"
"scripts/hydrate_cache.py" = "spec-ref scrub (drops 'SPEC.md §5.2')"
"scripts/register.py" = "forbidden-token scrub ('Independent of ai-project-status' comment) + spec-ref scrub ('SPEC.md §6')"
"scripts/search_vault.py" = "spec-ref scrub (drops 'SPEC.md §5.3')"

# --- generated ----------------------------------------------------------------
# NOT in the template tree — produced by a post-step at generation time, then
# tracked in the brain. Must land byte-identical to the golden (the `test`
# backend and shutil.copy2 are deterministic), so the G2 diff still governs them.
[generated]
paths = [
  "vault/archive/.gitkeep",
  "vault/areas/knowledge-management.md",
  "vault/projects/second-brain.md",
  "vault/resources/embeddings.md",
  "vault/resources/sqlite-vec.md",
]

[generated.by]
"vault/**" = "scripts/seed_vault.py copies seeds/** -> vault/** (do_seed: all files, incl. .gitkeep)"

# --- promote_to_devkit --------------------------------------------------------
# NOT emitted into the brain — but NOT a dead artifact either. This is the product
# DESIGN spec (schema, embedding contract, cache DDL, search/register behavior).
# Its canonical home is the devkit (the generator + system home); it is promoted
# there (lifecycle §4), not shipped into every brain. A brain's operational needs
# are met by the expanded README instead. See OQ-4.
[promote_to_devkit]
paths = [
  "SPEC.md",
]

[promote_to_devkit.reasons]
"SPEC.md" = "product design internals — owned by the devkit; a brain ships README (operational), not this (OQ-4)"

# --- exclude ------------------------------------------------------------------
# Dev-process artifacts — NEVER emitted, and discarded (not promoted). About
# *using AI to build & track a repo* (work the generator itself performs) and/or
# ai-project-status machinery. Omitted from the brain and from the G2 diff.
# `.claude/` disappears entirely (both its tracked files are here).
[exclude]
paths = [
  ".claude/hooks/check-daily-plan.py",
  ".claude/settings.json",
  "PLAN.md",
  "daily-plan.md",
  "tasks/0001-migrate-to-vault-rooted-layout.md",
  "tasks/0002-markdown-line-count-guard.md",
  "tasks/0003-para-seed-script.md",
  "tasks/0004-sidecar-policy-and-test-tiers.md",
]

[exclude.reasons]
".claude/hooks/check-daily-plan.py" = "ai-project-status daily-plan SessionStart hook — dev-process only"
".claude/settings.json" = "wires the SessionStart daily-plan hook — dev-process only"
"PLAN.md" = "the golden's own build tracker — the generator builds the brain instead"
"daily-plan.md" = "ai-project-status forward-plan — dev-process only"
"tasks/*" = "the golden's task specs — artifacts of hand-building the golden"
