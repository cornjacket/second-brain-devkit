# Emit manifest — the single source of truth for what a generated brain contains.
#
# SPEC.md §5.2. Every file the golden (../second-brain-test) tracks is classified
# below into exactly one bucket. Consumed by:
#   • the generator — which files to emit, and how (copy / clean / post-step);
#   • the G2 structural diff — the include-list (dev-process files are excluded,
#     so they never count as differences vs the golden);
#   • the forbidden-reference guard (tools/check_no_forbidden_refs.py) — its scope
#     is the emitted tree, which by construction excludes every non-emitted entry.
#
# Invariant: the four path sets below must PARTITION the golden's tracked files —
# every tracked file appears in exactly one, none appears twice.
# tools/check_manifest_partition.py enforces this against `git ls-files`.
#
# Most of the target state now lives in the golden itself (the SPEC.md removal +
# SPEC-ref scrub landed there, prototype-first, per OQ-4), so those files are
# plain verbatim copies. The remaining `cleaned` files differ from the golden
# only because the golden is a live ai-project-status-tracked dev repo (its
# CLAUDE.md dev-block) or is framed as the golden reference (its README).
#
# Data only; declarative. Paths are golden-relative. Stdlib-loadable via tomllib.

# Tokens that must never appear in an emitted brain (SPEC §5.2/§5.3). The guard
# fails on any hit in the generated tree.
forbidden_tokens = ["ai-project-status"]


# --- verbatim -----------------------------------------------------------------
# Copied byte-for-byte from the template into the generated brain. Free of
# forbidden tokens AND of any `SPEC.md §X` / cross-repo pointer (the golden was
# scrubbed of SPEC-refs in the OQ-4 rework, so golden == template here).
[verbatim]
paths = [
  ".gitattributes",
  ".gitignore",
  ".githooks/pre-commit",
  "config/.gitkeep",
  "data/.gitkeep",
  "requirements.txt",
  "scripts/check_line_count.py",
  "scripts/db.py",
  "scripts/embed_staged.py",
  "scripts/embedder.py",
  "scripts/hydrate_cache.py",
  "scripts/search_vault.py",
  "scripts/seed_vault.py",
  "scripts/self_test.py",
  "seeds/archive/.gitkeep",
  "seeds/areas/knowledge-management.md",
  "seeds/projects/second-brain.md",
  "seeds/resources/embeddings.md",
  "seeds/resources/sqlite-vec.md",
  "tests/README.md",
  "tests/fixtures/vault/areas/habits.md",
  "tests/fixtures/vault/areas/.habits.embed.json",
  "tests/fixtures/vault/resources/vectors.md",
  "tests/fixtures/vault/resources/.vectors.embed.json",
]

# --- cleaned ------------------------------------------------------------------
# Emitted, but the template stores an already-cleaned variant. These differ from
# the golden because the golden is a live ai-project-status-tracked dev repo (and
# its README is framed as the golden reference). Cleaning happens ONCE when the
# golden is productized into the template — not per-generation.
[cleaned]
paths = [
  "CLAUDE.md",
  "GEMINI.md",
  "README.md",
  "scripts/register.py",
]

[cleaned.reasons]
"CLAUDE.md" = "forbidden-token scrub — drop the ai-project-status managed block + Commit-schema + Daily-plan sections (the golden keeps them for its own dev-process; a brain must not)"
"GEMINI.md" = "symlink -> CLAUDE.md; inherits the scrub, emitted as a symlink"
"README.md" = "EXPAND into the brain's operational doc (record/query/setup) + provenance back-reference to the devkit; the golden's README is framed as the golden reference, so it differs from an emitted brain's (OQ-4)"
"scripts/register.py" = "forbidden-token scrub — drop the 'Independent of ai-project-status' comment (keep the behavior)"

# --- generated ----------------------------------------------------------------
# NOT in the template tree — produced by a post-step at generation time, then
# tracked in the brain. Must land byte-identical to the golden (the `test`
# backend and shutil.copy2 are deterministic), so the G2 diff still governs them.
[generated]
paths = [
  "vault/archive/.gitkeep",
  "vault/areas/knowledge-management.md",
  "vault/projects/second-brain.md",
  "vault/resources/embeddings.md",
  "vault/resources/sqlite-vec.md",
]

[generated.by]
"vault/**" = "scripts/seed_vault.py copies seeds/** -> vault/** (do_seed: all files, incl. .gitkeep)"

# --- exclude ------------------------------------------------------------------
# Dev-process artifacts — NEVER emitted. About *using AI to build & track a repo*
# (work the generator itself performs) and/or ai-project-status machinery. Omitted
# from the brain and from the G2 diff. `.claude/` disappears entirely (both its
# tracked files are here).
#
# The product DESIGN spec (schema, embedding contract, cache DDL, register) is not
# listed: it was promoted to the devkit (product-spec.md) and removed from the
# golden entirely (OQ-4), so it is no longer a golden-tracked file to classify.
[exclude]
paths = [
  ".claude/hooks/check-daily-plan.py",
  ".claude/settings.json",
  "PLAN.md",
  "daily-plan.md",
  "tasks/0001-migrate-to-vault-rooted-layout.md",
  "tasks/0002-markdown-line-count-guard.md",
  "tasks/0003-para-seed-script.md",
  "tasks/0004-sidecar-policy-and-test-tiers.md",
]

[exclude.reasons]
".claude/hooks/check-daily-plan.py" = "ai-project-status daily-plan SessionStart hook — dev-process only"
".claude/settings.json" = "wires the SessionStart daily-plan hook — dev-process only"
"PLAN.md" = "the golden's own build tracker — the generator builds the brain instead"
"daily-plan.md" = "ai-project-status forward-plan — dev-process only"
"tasks/*" = "the golden's task specs — artifacts of hand-building the golden"
