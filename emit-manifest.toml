# --- cleaned ------------------------------------------------------------------
# Emitted, but the template stores an already-cleaned variant. These differ from
# the golden because the golden is a live ai-project-status-tracked dev repo (and
# its README is framed as the golden reference). Cleaning happens ONCE when the
# golden is productized into the template — not per-generation.
[cleaned]
paths = [
  "CLAUDE.md",
  "GEMINI.md",
  "README.md",
  "config/embedder.toml",
  "scripts/register.py",
]

[cleaned.reasons]
"CLAUDE.md" = "forbidden-token scrub — drop the ai-project-status managed block + Commit-schema + Daily-plan sections (the golden keeps them for its own dev-process; a brain must not)"
"GEMINI.md" = "symlink -> CLAUDE.md; inherits the scrub, emitted as a symlink"
"README.md" = "operational guide (done in the golden, 9ed9356); swap the golden's 'golden reference -> local SPEC.md' top note for a provenance back-reference to the devkit (OQ-4)"
"config/embedder.toml" = "backend default flip — the golden pins 'test' (its fixtures + self-test are test-based); a generated brain defaults to 'ollama' so real semantic search works out of the box with no env var"
"scripts/register.py" = "forbidden-token scrub — drop the 'Independent of ai-project-status' comment (keep the behavior)"

# --- generated ----------------------------------------------------------------
# NOT in the template tree — produced by a post-step at generation time, then
# tracked in the brain. Must land byte-identical to the golden (the `test`
# backend and shutil.copy2 are deterministic), so the G2 diff still governs them.
[generated]
paths = [
  "vault/archive/.gitkeep",
  "vault/areas/knowledge-management.md",
  "vault/glossary/README.md",
  "vault/projects/second-brain.md",
  "vault/resources/embeddings.md",
  "vault/resources/sqlite-vec.md",
  "vault/templates/new-note.md",
]

[generated.by]
"vault/**" = "scripts/seed_vault.py copies seeds/** -> vault/** (do_seed: all files, incl. .gitkeep)"

# --- exclude ------------------------------------------------------------------
# NEVER emitted. Two kinds: (a) dev-process artifacts about *using AI to build &
# track a repo* (work the generator itself performs) and/or ai-project-status
# machinery; (b) the product DESIGN spec, which a brain does not ship (OQ-4) but
# the golden keeps as its build-time reference. Both are omitted from the brain
# and from the G2 diff. `.claude/` disappears entirely (both its files are here).
[exclude]
paths = [
  "SPEC.md",
  ".claude/hooks/check-daily-plan.py",
  ".claude/settings.json",
  "PLAN.md",
  "tasks/0001-migrate-to-vault-rooted-layout.md",
  "tasks/0002-markdown-line-count-guard.md",
  "tasks/0003-para-seed-script.md",
  "tasks/0004-sidecar-policy-and-test-tiers.md",
  "tests/test_tag_hygiene.py",
  "tests/test_chunker.py",
  "tests/test_pdf_extract.py",
  "tests/test_embed_pdf.py",
  "tests/test_pdf_cache.py",
  "tests/test_pdf_search.py",
  "tests/fixtures/pdf/sample.embed.json",
  "scripts/chunker.py",
  "scripts/pdf_extract.py",
  "scripts/embed_pdf.py",
  "scripts/pdf_cache.py",
  "scripts/pdf_search.py",
  "requirements-pdf.txt",
]

[exclude.reasons]
"SPEC.md" = "product design spec — NOT emitted into a brain (OQ-4), but kept in the golden as its build-time design reference; canonical ownership moves to the devkit only at mothball (G4). The emitted scripts carry no SPEC.md §X pointers, so brains stay clean without it."
".claude/hooks/check-daily-plan.py" = "ai-project-status daily-plan SessionStart hook — dev-process only"
".claude/settings.json" = "wires the SessionStart daily-plan hook — dev-process only"
"PLAN.md" = "the golden's own build tracker — the generator builds the brain instead"
"tasks/*" = "the golden's task specs — artifacts of hand-building the golden"
"tests/test_tag_hygiene.py" = "dev-only regression test for the tag-hygiene detector/applier (task #32) — builds fixtures in a tempdir; a brain ships the tools, not their tests. Run in CI against the vendored copy (gate 13)."
"tests/test_chunker.py" = "dev-only regression test for the PDF chunker (task #7, M1) — stdlib-only, self-contained; a brain ships the tool, not its test."
"tests/test_pdf_extract.py" = "dev-only regression test for pdf_extract (task #7, M1) — builds a PDF in a tempdir, skips when pypdf is absent; a brain ships the tool, not its test."
"tests/test_embed_pdf.py" = "dev-only regression test for the chunk-list sidecar writer (task #7, M2) — regenerates the sidecar on the test backend and byte-compares the committed fixture; a brain ships the tool, not its test."
"tests/fixtures/pdf/sample.embed.json" = "committed test-backend fixture for the M2 chunk-list sidecar — the byte-exact expected output test_embed_pdf regenerates and compares. Dev-only; never emitted."
"tests/test_pdf_cache.py" = "dev-only regression test for the M3 bolt-on cache tables + loader (task #7) — builds tables in-memory and hydrates a temp vault; proves the note path is unchanged. A brain ships the tool, not its test."
"tests/test_pdf_search.py" = "dev-only regression test for M4 passage search (task #7) — loads two docs into a temp cache and asserts fusion, best_per_source vs all_chunks, and the within-document scope. A brain ships the tool, not its test."
"scripts/chunker.py" = "PDF ingestion (task #7) — built at M1, NOT YET EMITTED. Held out of a brain until M6 wires the whole feature (add_pdf, search, README, CI gate); promote to `verbatim` then. See docs/pdf-ingestion.md §6."
"scripts/pdf_extract.py" = "PDF ingestion (task #7) — built at M1, NOT YET EMITTED. Held out of a brain until M6 (see docs/pdf-ingestion.md §6); promote to `verbatim` then. Imports the optional pypdf lazily."
"scripts/embed_pdf.py" = "PDF ingestion (task #7) — the M2 chunk-list sidecar writer, NOT YET EMITTED. Held out of a brain until M6 (see docs/pdf-ingestion.md §6); promote to `verbatim` then. pypdf-free (takes extracted text)."
"scripts/pdf_cache.py" = "PDF ingestion (task #7) — the M3 bolt-on cache tables (pdf_chunks/_meta/_fts) + loader, NOT YET EMITTED. hydrate_cache.py imports it defensively, so a brain without it skips PDF loading and its note path is byte-identical. Promote to `verbatim` at M6. See docs/pdf-ingestion.md §4."
"scripts/pdf_search.py" = "PDF ingestion (task #7) — the M4 chunk-grain passage search (RRF fusion, best_per_source/all_chunks, within-document), NOT YET EMITTED. Standalone from search_vault so the note path is untouched; unified into the MCP/CLI surface at M5/M6. Promote to `verbatim` then. See docs/pdf-ingestion.md §5."
"requirements-pdf.txt" = "PDF ingestion (task #7) optional-dep manifest — built at M1, NOT YET EMITTED. Promote to `verbatim` at M6 when a brain gains the add_pdf command. See docs/pdf-ingestion.md."
